<!DOCTYPE html>
<html>
<head>
  <title>Bookstore Management</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">

  <style>
    body {
      margin: 0;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    /* HEADER */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 6%;
      box-sizing: border-box;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #e5e5e5;
      position: relative;
      z-index: 100;
    }

    #leftHeader img {
      width: 120px;
    }

    #midHeader {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 1;
      justify-content: center;
    }

    /* SEARCH */
    #searchBoxForm {
      display: flex;
      align-items: center;
      background: #f5f5f7;
      border: 1px solid #c7c7cc;
      border-radius: 999px;
      padding: 8px 14px;
      width: 320px;
    }

    #searchBox {
      border: none;
      background: transparent;
      outline: none;
      font-size: 15px;
      width: 100%;
      color: #1d1d1f;
    }

    #searchBox::placeholder {
      color: #6e6e73;
    }

    #searchIcon {
      width: 20px;
      opacity: 0.6;
    }

    /* CATEGORY DROPDOWN */
    .dropdown {
      position: relative;
    }

    .dropdownSelect {
      padding: 10px 24px;
      background: white;
      border: 1px solid #c7c7cc;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 500;
      color: #1d1d1f;
      cursor: pointer;
    }

    .dropdownContent {
      display: none;
      position: absolute;
      top: 45px;
      left: 0;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      padding: 10px;
      min-width: 210px;
      z-index: 9999; 
    }

    .dropdown:hover .dropdownContent {
      display: block;
    }

    .dropdownContent a {
      display: block;
      padding: 10px;
      text-decoration: none;
      color: #1d1d1f;
      border-radius: 10px;
    }

    .dropdownContent a:hover {
      background: #f5f5f7;
    }

    /* RIGHT BUTTONS */
    #rightHeader {
      display: flex;
      gap: 12px;
    }

    .navButton a {
      padding: 10px 22px;
      border-radius: 999px;
      background: #0071e3;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: 0.2s;
    }

    .navButton a:hover {
      background: #0077ed;
    }

    /* MAIN */
    main {
      width: 100%;
      box-sizing: border-box;
    }

    /* FOOTER */
    footer {
      width: 100%;
      padding: 25px 6%;
      border-top: 1px solid #e5e5e5;
      color: #6e6e73;
      background: #f5f5f7;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<header>

  <!-- LOGO -->
  <div id="leftHeader">
    <a href="{{ url_for('home') }}">
      <img src="{{ url_for('static', filename='images/misc/treble-clef-logo.jpg') }}">
    </a>
  </div>

  <!-- SEARCH + CATEGORY -->
  <div id="midHeader">

    <form id="searchBoxForm" action="{{ url_for('search') }}" method="post">
      <input id="searchBox" name="search" placeholder="Search book title...">
      <input id="searchIcon" type="image"
             src="{{ url_for('static', filename='images/misc/search-icon.png') }}">
    </form>

    <div class="dropdown">
      <div class="dropdownSelect">Categories</div>

      <div class="dropdownContent">
        {% for category in categories %}
          <a href="{{ url_for('category', categoryId=category['categoryId']) }}">
            {{ category['categoryName'] }}
          </a>
        {% endfor %}
      </div>
    </div>

  </div>

  <!-- NAV BUTTONS -->
  <div id="rightHeader">
    <div class="navButton">
      <a href="{{ url_for('read_books') }}">All Books</a>
    </div>

    <div class="navButton">
      <a href="{{ url_for('create_book') }}">Create Book</a>
    </div>
  </div>

</header>

<main>
  {% block container %}{% endblock %}
</main>

<footer>
  <p>Bookstore Management System ©</p>
</footer>

</body>
</html>
